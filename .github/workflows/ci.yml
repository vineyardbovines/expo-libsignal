name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Native iOS/Android example builds are intentionally NOT in CI. We verify
# native changes via on-device smoke runs (see example/SMOKE_TEST_LOG.md), and
# the CI versions were brittle against RN/Xcode/runner-image drift while
# duplicating coverage the smoke flow already provides. CI here is JS-only:
# lint, typecheck, unit tests. Anyone touching ios/, android/, or the config
# plugin is responsible for running smoke on both platforms before merging.

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies (root)
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test
